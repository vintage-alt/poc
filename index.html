<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Adidas Style</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Roboto', sans-serif;
    }

    body {
        background: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 350px;
        padding: 40px;
    }

    .logo {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 2px;
        margin-bottom: 30px;
    }

    .logo span {
        display: inline-block;
        border-bottom: 3px solid black;
        margin-right: 3px;
    }

    h2 {
        margin-bottom: 25px;
        font-weight: 700;
    }

    .input-group {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        border-color: black;
    }

    .btn {
        width: 100%;
        padding: 14px;
        background: black;
        color: white;
        border: none;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #333;
    }

    .links {
        margin-top: 15px;
        font-size: 13px;
    }

    .links a {
        display: block;
        color: black;
        text-decoration: none;
        margin-top: 5px;
    }

    .links a:hover {
        text-decoration: underline;
    }

    .divider {
        margin: 25px 0;
        text-align: center;
        font-size: 13px;
        color: #888;
    }

    .social-btn {
        width: 100%;
        padding: 12px;
        border: 1px solid black;
        background: white;
        cursor: pointer;
        margin-bottom: 10px;
        font-weight: 500;
    }

    .social-btn:hover {
        background: #f5f5f5;
    }
</style>
</head>

<body>

<div class="container">
    
    <div class="logo">
        <span></span><span></span><span></span> adidas
    </div>

    <h2>Sign in</h2>

    <form>
        <div class="input-group">
            <input type="email" placeholder="Email address" required>
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password" required>
        </div>

        <button class="btn">LOGIN</button>
    </form>

    <div class="links">
        <a href="#">Forgot your password?</a>
        <a href="#">Create an account</a>
    </div>

    <div class="divider">OR</div>

    <button class="social-btn">Continue with Google</button>
    <button class="social-btn">Continue with Facebook</button>

</div>

</body>
</html>
